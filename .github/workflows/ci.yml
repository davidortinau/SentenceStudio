name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  migration-guard:
    name: Migration attribute guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate EF migration [Migration]/[DbContext] attributes
        # Catches the recurring dual-provider bug where a hand-written SQLite
        # migration is missing [Migration("<id>")] and is silently skipped on
        # mobile (RefreshTokenReplacedBy 2026-05-03, ActivitySession 2026-07-02).
        # Static + deterministic + device-free — a raw-DDL test cannot catch it.
        run: bash scripts/validate-migration-attributes.sh

  build:
    name: Build ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: Api
            path: src/SentenceStudio.Api/SentenceStudio.Api.csproj
            sdk: net10
          - project: WebApp
            path: src/SentenceStudio.WebApp/SentenceStudio.WebApp.csproj
            sdk: net11-preview
          - project: AppLib
            path: src/SentenceStudio.AppLib/SentenceStudio.AppLib.csproj
            sdk: net11-preview

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        if: matrix.sdk == 'net10'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup .NET 11 preview SDK
        if: matrix.sdk == 'net11-preview'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'
          dotnet-quality: 'preview'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ matrix.project }}-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ matrix.project }}-
            ${{ runner.os }}-nuget-

      - name: Disable dev-only local NuGet source
        run: dotnet nuget disable source localnugets --configfile src/NuGet.config || true

      - name: Restore
        run: dotnet restore ${{ matrix.path }} -p:IncludeMobileTargets=false

      - name: Build
        run: dotnet build ${{ matrix.path }} --no-restore -c Release -p:IncludeMobileTargets=false

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-test-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-test-
            ${{ runner.os }}-nuget-

      - name: Disable dev-only local NuGet source
        run: dotnet nuget disable source localnugets --configfile src/NuGet.config || true

      - name: Restore & build unit tests
        run: |
          dotnet restore tests/SentenceStudio.UnitTests/SentenceStudio.UnitTests.csproj -p:IncludeMobileTargets=false
          dotnet build tests/SentenceStudio.UnitTests/SentenceStudio.UnitTests.csproj --no-restore -c Release -p:IncludeMobileTargets=false

      # IntegrationTests excluded: references non-existent src/SentenceStudio/SentenceStudio.csproj
      # Re-enable once the broken ProjectReference is fixed (see PR #69 review)

      - name: Run unit tests
        run: >
          dotnet test tests/SentenceStudio.UnitTests/SentenceStudio.UnitTests.csproj
          --no-build -c Release
          -p:IncludeMobileTargets=false
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always() && github.event_name == 'pull_request'
        with:
          name: Test Results
          path: test-results/**/*.trx
          reporter: dotnet-trx
