name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  checks: write
  pull-requests: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  Auth__UseEntraId: "false"

jobs:
  build:
    name: Build ${{ matrix.project }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - project: Api
            path: src/SentenceStudio.Api
          - project: WebApp
            path: src/SentenceStudio.WebApp
          - project: AppLib
            path: src/SentenceStudio.AppLib
            maui: true

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Install MAUI workload
        if: matrix.maui == true
        run: dotnet workload install maui

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ matrix.project }}-${{ hashFiles('**/*.csproj', 'src/NuGet.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-${{ matrix.project }}-
            ${{ runner.os }}-nuget-

      - name: Remove local NuGet source
        run: |
          # The local NuGet source only exists on dev machines
          sed -i '/<add key="localnugets"/d' src/NuGet.config
          sed -i '/<packageSource key="localnugets">/,/<\/packageSource>/d' src/NuGet.config

      - name: Restore
        run: dotnet restore ${{ matrix.path }}

      - name: Build
        run: dotnet build ${{ matrix.path }} --no-restore -c Release

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-test-${{ hashFiles('**/*.csproj', 'src/NuGet.config') }}
          restore-keys: |
            ${{ runner.os }}-nuget-test-
            ${{ runner.os }}-nuget-

      - name: Remove local NuGet source
        run: |
          sed -i '/<add key="localnugets"/d' src/NuGet.config
          sed -i '/<packageSource key="localnugets">/,/<\/packageSource>/d' src/NuGet.config

      - name: Restore
        run: |
          dotnet restore tests/SentenceStudio.UnitTests
          dotnet restore tests/SentenceStudio.IntegrationTests

      - name: Build
        run: |
          dotnet build tests/SentenceStudio.UnitTests --no-restore -c Release
          dotnet build tests/SentenceStudio.IntegrationTests --no-restore -c Release

      - name: Run unit tests
        run: >
          dotnet test tests/SentenceStudio.UnitTests
          --no-build -c Release
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory ./test-results

      - name: Run integration tests
        run: >
          dotnet test tests/SentenceStudio.IntegrationTests
          --no-build -c Release
          --logger "trx;LogFileName=integration-tests.trx"
          --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results/

      - name: Publish test report
        uses: dorny/test-reporter@v1
        if: always() && github.event_name == 'pull_request'
        with:
          name: Test Results
          path: test-results/**/*.trx
          reporter: dotnet-trx
